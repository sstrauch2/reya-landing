<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reya — A new day for your finances</title>
  <meta name="description" content="Your bank shows a number. It doesn't show the truth. Reya does." />
  <meta property="og:title" content="Reya — A new day for your finances" />
  <meta property="og:description" content="Your bank shows a number. It doesn't show the truth. Reya does." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://reya.money" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Dawn horizon background */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        #0a0e1a 0%,
        #0d1a2e 12%,
        #142840 22%,
        #1e3a54 30%,
        #2a4a6a 38%,
        #3a5a7a 44%,
        #6a7a8a 50%,
        #8a7a60 54%,
        #a08050 57%,
        #b88a45 60%,
        #c8903a 62%,
        #c07838 64%,
        #a06030 66%,
        #6a4020 70%,
        #3a2010 80%,
        #1a1008 90%,
        #0a0804 100%
      );
      z-index: 0;
    }

    /* Sun glow */
    .sun-glow {
      position: fixed;
      bottom: 34%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(
        ellipse at center bottom,
        rgba(255, 200, 80, 0.55) 0%,
        rgba(255, 170, 50, 0.30) 20%,
        rgba(255, 140, 30, 0.15) 45%,
        transparent 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Water reflection — bottom 34% */
    .water {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 34%;
      background: linear-gradient(
        to bottom,
        #1a1008 0%,
        #0e0c0a 40%,
        #080806 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Sun reflection stripe in water */
    .water::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(200, 140, 40, 0.35) 0%,
        rgba(180, 120, 30, 0.20) 30%,
        rgba(140, 90, 20, 0.08) 65%,
        transparent 100%
      );
      filter: blur(8px);
    }

    /* Horizon line */
    .horizon {
      position: fixed;
      bottom: 34%;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(200, 160, 60, 0.15) 15%,
        rgba(220, 180, 80, 0.55) 35%,
        rgba(240, 200, 100, 0.75) 50%,
        rgba(220, 180, 80, 0.55) 65%,
        rgba(200, 160, 60, 0.15) 85%,
        transparent 100%
      );
      box-shadow: 0 0 6px 1px rgba(220, 180, 70, 0.20);
      z-index: 2;
      pointer-events: none;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 4rem;
      font-weight: normal;
      color: #ffffff;
      letter-spacing: 0.08em;
      text-shadow: 0 0 40px rgba(255, 200, 100, 0.4), 0 2px 8px rgba(0, 0, 0, 0.6);
      margin-bottom: 0.6rem;
    }

    .tagline {
      font-size: 1rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 220, 170, 0.9);
      margin-bottom: 3rem;
    }

    .narrative {
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 2.2;
      margin-bottom: 3rem;
    }

    .narrative p {
      color: rgba(255, 255, 255, 0.85);
    }

    .narrative p.highlight {
      color: rgba(255, 210, 130, 0.95);
      font-weight: 400;
    }

    .byline {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.4);
    }

    @media (max-width: 600px) {
      .logo {
        font-size: 3rem;
      }

      .tagline {
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }

      .narrative {
        font-size: 0.95rem;
        margin-bottom: 2rem;
      }

      .sun-glow {
        width: 320px;
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="sun-glow"></div>
  <div class="water"></div>
  <div class="horizon"></div>

  <!-- Stars -->
  <div class="stars">
    <div class="star" style="top:4%;left:18%;width:2px;height:2px;background:radial-gradient(circle,rgba(255,255,255,0.50) 0%,transparent 70%);"></div>
    <div class="star" style="top:7%;left:72%;width:2px;height:2px;background:radial-gradient(circle,rgba(255,255,255,0.45) 0%,transparent 70%);"></div>
    <div class="star" style="top:11%;left:38%;width:1px;height:1px;background:radial-gradient(circle,rgba(255,255,255,0.35) 0%,transparent 70%);"></div>
    <div class="star" style="top:14%;left:85%;width:2px;height:2px;background:radial-gradient(circle,rgba(255,255,255,0.40) 0%,transparent 70%);"></div>
    <div class="star" style="top:6%;left:55%;width:1px;height:1px;background:radial-gradient(circle,rgba(255,255,255,0.30) 0%,transparent 70%);"></div>
    <div class="star" style="top:19%;left:10%;width:2px;height:2px;background:radial-gradient(circle,rgba(255,255,255,0.25) 0%,transparent 70%);"></div>
    <div class="star" style="top:22%;left:62%;width:1px;height:1px;background:radial-gradient(circle,rgba(255,255,255,0.30) 0%,transparent 70%);"></div>
    <div class="star" style="top:9%;left:28%;width:2px;height:2px;background:radial-gradient(circle,rgba(255,255,255,0.35) 0%,transparent 70%);"></div>
  </div>

  <div class="content">
    <h1 class="logo">Reya</h1>
    <p class="tagline">A new day for your finances</p>
    <div class="narrative">
      <p>Your bank shows a number.</p>
      <p>It doesn't show the truth.</p>
      <p class="highlight">Reya does.</p>
    </div>
    <p class="byline">Built by a former Capital One R&amp;D lead and Techstars founder</p>
  </div>
</body>
</html>
